<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png" type="image/png" style="width: 100%;">


</head>
<body>
    <div class="login-container">
    <h1>Welcome to Study Tracker</h1>
    </div>

    <form action="/login" method="post" id = "loginForm" class="register-form">


        <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        </div>

        <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        </div>

        <br><br>

    <button type="submit" class="login-button" id="loginBtn" style="border: none; cursor: pointer; display: block; text-align: center; text-decoration: none;">
        Login
    </button>


        <br><br><br><br>
        <p>Don't have an account? <a href="register.html">Register here</a>.</p>
    </form>
</body>
</html>
