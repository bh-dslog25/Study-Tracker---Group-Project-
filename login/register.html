<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png" type="image/png" style="width: 100%;">



</head>
<body>
    <div class="signup-container">
    <h1>Welcome to Study Tracker</h1>

    <h2>You are a newbie ? Welcome to our study tracker!</h2>
    </div>

    <form action="/register" method="post" id = "registerForm" class="register-form">

        <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        </div>
        
        <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        </div>

        <div class="form-group">
        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" required><br><br>
        </div>

        <div class="form-group">
        <label for="email">Email:</label>
        <input type="text" id="email" name="email" required><br><br>
        </div>

        <br>

        <a href="login.html" class="register-button" id="register">Register</a>
    </form>
</body>
</html>
